name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: lazyevm-x86_64-linux.tar.gz
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            asset: lazyevm-aarch64-linux.tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-13
            asset: lazyevm-x86_64-darwin.tar.gz
            cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset: lazyevm-aarch64-darwin.tar.gz
            cross: false

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.asset }} lazyevm
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lazyevm-x86_64-linux.tar.gz
            lazyevm-aarch64-linux.tar.gz
            lazyevm-x86_64-darwin.tar.gz
            lazyevm-aarch64-darwin.tar.gz
